<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .gallery { display: flex; gap: 20px; flex-wrap: wrap; }
        .gallery img { max-width: 300px; border: 1px solid #ccc; padding: 5px; }
    </style>
</head>
<body>
    <h1>Image Gallery</h1>
    <div class="gallery">
        <img src="/test.jpg" alt="Test JPG Image">
        <img src="/test.png" alt="Test PNG Image">
        <img src="/kira.gif" alt="Test GIF Animation">
    </div>
</body>
</html>
